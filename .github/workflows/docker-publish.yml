name: Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Golang
        uses: actions/setup-go@v4
        with:
          go-version: ~1.22.2

      - name: Build images binary
        run: |
          go install github.com/markbates/pkger/cmd/pkger@latest
          go generate github.com/aerokube/images
          go build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, Tag and Push Chrome Image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$OWNER_LC/vnc"
          
          # Required dependencies for building locally
          git clone -b add-missing-dependency https://github.com/sskorol/selenoid-container-tests.git ../selenoid-container-tests
          cd ./selenium/base && docker build -t browsers/base:7.4.2 . && cd ../../
          
          # Build Chrome using the go binary, test it, and tag it
          ./images chrome -b 146.0.7680.153-1 -t $IMAGE_NAME:chrome_146.0
          
          docker tag $IMAGE_NAME:chrome_146.0 $IMAGE_NAME:latest
          
          docker push $IMAGE_NAME:chrome_146.0
          docker push $IMAGE_NAME:latest
